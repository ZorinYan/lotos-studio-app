# Пинг Render API, чтобы free-инстанс не засыпал (~15 мин без запросов).
name: Render keep-alive

on:
  schedule:
    # UTC. Каждые 10 минут; минуты 3/13/… — не в пик :00/:30, GitHub реже пропускает.
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        run: |
          curl -fsS --retry 2 --retry-delay 5 --max-time 45 \
            "https://lotos-studio-app.onrender.com/health"
