<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Lotos Studio</title>
    <script>
      try {
        var lotosTheme = localStorage.getItem('lotos_color_scheme')
        if (lotosTheme === 'dark') {
          document.documentElement.setAttribute('data-lotos-theme', 'dark')
          document.documentElement.style.colorScheme = 'dark'
        }
      } catch (e) {}
    </script>
    <script>
      // Ранняя инициализация до загрузки React (требование VK).
      if (window.parent !== window) {
        try {
          parent.postMessage(
            {
              type: 'vk-connect',
              handler: 'VKWebAppInit',
              params: {},
              connectVersion: '2.15.12',
              webFrameId: Math.random().toString(36).slice(2, 5),
            },
            '*',
          )
        } catch (e) {}
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
