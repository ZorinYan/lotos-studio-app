# API для мини-приложения (бесплатный Web Service на Render).
# Фронтенд — на Vercel (см. DEPLOY.md).
#
# Keep-alive (бесплатно): встроенный ping /health + GitHub Actions + взаимный ping с VK-ботом.
# RENDER_EXTERNAL_URL Render задаёт сам; KEEPALIVE_EXTRA_URLS — соседний сервис.
#
# Если репозиторий = только папка personal_acc_lotos: rootDir = server
# Если монорепо: rootDir = personal_acc_lotos/server
services:
  - type: web
    name: lotos-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: KEEPALIVE_INTERVAL_SEC
        value: "540"
      - key: KEEPALIVE_EXTRA_URLS
        value: https://lotos-vk-bot.onrender.com
      - key: YCLIENTS_PARTNER_TOKEN
        sync: false
      - key: YCLIENTS_USER_TOKEN
        sync: false
      - key: YCLIENTS_COMPANY_ID
        sync: false
      - key: STUDIO_NAME
        value: Лотос
      - key: YCLIENTS_BOOKING_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: VK_APP_SECRET
        sync: false
      - key: VK_GROUP_TOKEN
        sync: false
      - key: VK_GROUP_ID
        value: "234626072"
      - key: VK_SERVICE_TOKEN
        sync: false
      - key: STUDIO_ADDRESS
        sync: false
      - key: STUDIO_HOURS
        sync: false
      - key: STUDIO_PHONE
        sync: false
      - key: STUDIO_LATITUDE
        sync: false
      - key: STUDIO_LONGITUDE
        sync: false
