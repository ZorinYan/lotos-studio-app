# API для мини-приложения (бесплатный Web Service на Render).
# Фронтенд — на Vercel (см. DEPLOY.md).
#
# Если репозиторий = только папка personal_acc_lotos: rootDir = server
# Если монорепо: rootDir = personal_acc_lotos/server
services:
  - type: web
    name: lotos-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: YCLIENTS_PARTNER_TOKEN
        sync: false
      - key: YCLIENTS_USER_TOKEN
        sync: false
      - key: YCLIENTS_COMPANY_ID
        sync: false
      - key: STUDIO_NAME
        value: Лотос
      - key: YCLIENTS_BOOKING_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
