# Деплой API мини-приложения на Render (бесплатный тариф)
# Dashboard → New → Blueprint → подключите репозиторий GitHub
services:
  - type: web
    name: lotos-miniapp-api
    runtime: python
    rootDir: personal_acc_lotos/server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: YCLIENTS_PARTNER_TOKEN
        sync: false
      - key: YCLIENTS_USER_TOKEN
        sync: false
      - key: YCLIENTS_COMPANY_ID
        sync: false
      - key: STUDIO_NAME
        value: Лотос
      - key: YCLIENTS_BOOKING_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
